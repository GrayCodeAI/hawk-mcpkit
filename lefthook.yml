# Canonical lefthook config for hawk-eco Go repos.
# Source of truth: https://github.com/GrayCodeAI/hawk/blob/main/.shared-templates/lefthook.yml.tmpl
# Install: lefthook install
# Skip once: LEFTHOOK=0 git commit -m "..."

prepare-commit-msg:
  commands:
    strip-co-authored-by:
      run: |
        sed '/^[Cc]o-[Aa]uthored-[Bb]y:/d' "{1}" > "{1}.tmp" && mv "{1}.tmp" "{1}"

commit-msg:
  commands:
    strip-co-authored-by:
      run: |
        sed '/^[Cc]o-[Aa]uthored-[Bb]y:/d' "{1}" > "{1}.tmp" && mv "{1}.tmp" "{1}"

pre-push:
  commands:
    boundaries:
      run: bash ./scripts/check-ecosystem-boundaries.sh
    test:
      run: go test ./... -race -count=1
